; ESP32-2432S028R "Cheap Yellow Display" -- Claude quota monitor
;
; Board: ESP32-WROOM-32 (D0WD-V3), 4MB flash, CH340 USB serial,
;        2.8" 240x320 ILI9341 over VSPI, XPT2046 resistive touch on HSPI.
;
; TFT_eSPI is configured entirely through build flags here, so the library's
; own User_Setup.h is left untouched -- nothing to re-edit after a lib update.

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Free Fonts push the image past the default 1.3MB app slot. No OTA here, so
; hand the whole flash to the application.
board_build.partitions = huge_app.csv
; 460800 makes this board's CH340 drop bytes mid-transfer; 230400 is stable.
upload_speed = 230400

lib_deps =
    ; TFT_eSPI is kept, but only as the panel driver LVGL flushes through.
    bodmer/TFT_eSPI@^2.5.43
    ; The registry copy is only published as 0.0.0-alpha, so pull the tagged
    ; release straight from git rather than depending on an alpha version.
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git#v1.4
    bblanchon/ArduinoJson@^7.0.4
    lvgl/lvgl@^9.2.0

build_flags =
    -DUSER_SETUP_LOADED=1

    ; --- LVGL -------------------------------------------------------------
    ; Point LVGL at the config by absolute path. Relying on include/ being on
    ; the search path does not work here: the flag reaches the library, the
    ; library takes the "just include lv_conf.h" branch, and the include
    ; resolves to nothing -- so every setting silently reverts to LVGL's
    ; defaults and the build still succeeds, several hundred KB heavier.
    ; Verify with: grep -c lv_tabview .pio/build/cyd/firmware.map  (want 0)
    ; The quotes have to survive into the macro value -- LVGL does
    ; `#include LV_CONF_PATH`, so it must expand to a quoted string.
    -DLV_CONF_PATH=\"${PROJECT_DIR}/include/lv_conf.h\"

    ; --- Panel ------------------------------------------------------------
    ; The CYD's ILI9341 needs the alternative init sequence; with the plain
    ; ILI9341_DRIVER the panel renders with inverted colours on most units.
    ; If your board comes out inverted anyway, swap these two lines.
    -DILI9341_2_DRIVER=1
    ; -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320

    ; --- Display wiring (VSPI) --------------------------------------------
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH

    ; --- Fonts ------------------------------------------------------------
    ; The bitmap faces (FONT4/6/7) are dropped; everything is drawn with the
    ; Adafruit GFX Free Fonts, which have real letterforms and kerning.
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

    ; --- SPI --------------------------------------------------------------
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
