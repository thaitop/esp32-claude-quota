  <line x1="12" y1="12" x2="12" y2="22"/>
  <line x1="12" y1="12" x2="2" y2="12"/>
  <line x1="12" y1="12" x2="22" y2="12"/>
  <line x1="12" y1="12" x2="5.2" y2="5.2"/>
  <line x1="12" y1="12" x2="18.8" y2="18.8"/>
  <line x1="12" y1="12" x2="18.8" y2="5.2"/>
  <line x1="12" y1="12" x2="5.2" y2="18.8"/>
  <line x1="12" y1="12" x2="12" y2="4.5" stroke-width="0"/>
  <line x1="12" y1="12" x2="8" y2="3"/>
  <line x1="12" y1="12" x2="16" y2="3"/>
  <line x1="12" y1="12" x2="8" y2="21"/>
  <line x1="12" y1="12" x2="16" y2="21"/>
  <line x1="12" y1="12" x2="3" y2="8"/>
  <line x1="12" y1="12" x2="3" y2="16"/>
  <line x1="12" y1="12" x2="21" y2="8"/>
  <line x1="12" y1="12" x2="21" y2="16"/>
</svg>
